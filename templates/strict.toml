name = "strict"
description = "Near-zero permissions. Barely enough to boot a dynamically-linked binary on macOS."

[filesystem]
allow_metadata_read = true
# Everything the dynamic linker needs to load a Mach-O binary.
# macOS 14+ stores the dyld shared cache in cryptex volumes mounted
# under /System/Cryptexes and /System/Volumes/Preboot/Cryptexes — both
# need to be readable or dynamic binaries SIGABRT at startup before
# they can even run their main(). /System includes /System/Cryptexes
# via the APFS volume group firmlinks, but the underlying Preboot mount
# has to be listed too (Seatbelt path matching is post-resolution and
# some dyld lookups land on the Preboot path directly).
read = [
    "/usr/lib",
    "/usr/share",
    "/System",
    "/System/Volumes/Preboot/Cryptexes",
    "/Library/Apple/System",
    "/private/var/db/dyld",
    "/private/var/db/timezone",
    "/private/var/db/mds",
    "/dev",
    # macOS's /usr/bin/{git,python3,clang,make,...} are thin xcrun stubs
    # that dlopen libxcrun.dylib and then exec the real binary under
    # either Xcode.app or the Command Line Tools bundle. Without read
    # access to at least one of these the stub fails with
    # "unable to load libxcrun" before the real tool runs. Both paths
    # are system-managed and read-only on disk, so the cost is low.
    "/Library/Developer/CommandLineTools",
    "/Applications/Xcode.app",
]
read_files = [
    "/etc/hosts",
    "/etc/resolv.conf",
    "/etc/services",
    "/etc/nsswitch.conf",
    "/etc/localtime",
    "/dev/urandom",
    "/dev/random",
    "/dev/zero",
]

# /dev/null and /dev/tty are commonly both read *and* written (crashpad,
# stdio redirection, readline etc.) — permitted as rw literals.
read_write_files = [
    "/dev/null",
    "/dev/tty",
]

[network]

[process]
# intentionally unset — default is no fork, no exec. Extenders grant these
# explicitly as needed.

[system]
allow_sysctl_read = true
# Minimal Mach services needed for dyld / libSystem init + TLS cert
# validation (so HTTPS works out of the box when network is enabled).
# Extenders can add more.
mach_services = [
    "com.apple.system.logger",
    "com.apple.system.notification_center",
    "com.apple.system.opendirectoryd.libinfo",
    "com.apple.system.opendirectoryd.membership",
    "com.apple.logd",
    "com.apple.diagnosticd",
    "com.apple.cfprefsd.daemon",
    "com.apple.cfprefsd.agent",
    # TLS / cert trust (safe — no access to secrets themselves)
    "com.apple.SecurityServer",
    "com.apple.trustd",
    "com.apple.trustd.agent",
    # DNS + network config
    "com.apple.SystemConfiguration.configd",
    "com.apple.dnssd.service",
]

[env]
pass = ["PATH", "LANG", "LC_ALL", "TERM", "TMPDIR"]
