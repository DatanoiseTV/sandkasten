name = "browser"
description = "Chromium-family browsers (Brave, Chrome, Edge). Launch with --no-sandbox flag so the browser doesn't try to sandbox-in-sandbox. Add --password-store=basic to silence the Keychain warning — saved passwords then live plaintext in the profile dir, appropriate for a throwaway session."

[filesystem]
allow_metadata_read = true
# Browsers touch a lot — read access to the whole FS is permitted so
# extensions, downloads, dev tools, printing etc. all work. Writes are
# narrowed and secrets are explicitly denied below.
read = ["/"]
read_write = [
    "/dev",
    "/tmp",
    "/private/tmp",
    "/private/var/folders",
    "~/Library/Caches",
    "~/Library/Application Support/BraveSoftware",
    "~/Library/Application Support/Google",
    "~/Library/Application Support/Chromium",
    "~/Library/Application Support/Microsoft Edge",
    "~/Library/Preferences",
    "~/Library/Logs",
    "~/Library/Saved Application State",
    "~/Library/WebKit",
    "~/Downloads",
    "~/Desktop",
    "~/Documents",
]
deny = [
    # Never readable by the browser — session credentials & secrets.
    "~/.ssh",
    "~/.aws",
    "~/.config/gcloud",
    "~/.docker",
    "~/.gnupg",
    "~/.kube",
    "~/.netrc",
    "~/.password-store",
    "~/Library/Keychains",
    "~/Library/Application Support/com.apple.TCC",
    "~/Library/Cookies",
    "~/Library/Mail",
    "~/Library/Messages",
    "~/.bash_history",
    "~/.zsh_history",
    # Other browsers' profile dirs — don't let one browser peek at another.
    "~/Library/Application Support/Firefox",
    "~/Library/Safari",
]

[network]
allow_localhost = true
allow_dns = true
allow_inbound = true
allow_unix_sockets = true
outbound_tcp = ["*:443", "*:80"]

[process]
allow_fork = true
allow_exec = true

[system]
allow_sysctl_read = true
allow_iokit = true
allow_ipc = true
# Browsers use a huge surface of Mach services (WindowServer, fonts, font
# server, print, accessibility, spellcheck, pasteboard, speech, IOKit,
# audio, color, metal, power, etc.). Enumerating them all is brittle across
# macOS versions — allow_mach_all is the pragmatic choice.
allow_mach_all = true

[env]
pass_all = true
