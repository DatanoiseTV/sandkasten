name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  macos:
    name: macOS (build + clippy + test)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --release
      - run: cargo build --release
      - run: cargo test --release

  swift-ui:
    name: Swift UI (macOS, builds the .app)
    runs-on: macos-latest
    needs: macos   # needs the CLI to embed in the bundle
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: swift build
        working-directory: swift-ui
        run: swift build -c release
      - name: Generate icon + package .app
        working-directory: swift-ui
        run: |
          swift icon/generate-icon.swift
          ./build-app.sh
      - name: Sanity-check bundle
        working-directory: swift-ui
        run: |
          test -x .build/Sandkasten.app/Contents/MacOS/Sandkasten
          test -x .build/Sandkasten.app/Contents/Resources/sandkasten
          .build/Sandkasten.app/Contents/Resources/sandkasten --version
          plutil -lint .build/Sandkasten.app/Contents/Info.plist

  linux:
    name: Linux (build + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --release
      - run: cargo build --release
      - run: cargo test --release

  supply-chain:
    name: Supply-chain hygiene (audit + deny + SBOM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Known-vulnerability scan against the lockfile (RustSec advisory DB).
      - name: cargo-audit
        run: |
          cargo install --locked cargo-audit
          cargo audit

      # License + duplicate + source-allow-list policy enforcement
      # (deny.toml lives at the repo root). Fails the build on any
      # disallowed license, banned crate, untrusted source registry, or
      # duplicate dependency version above the policy threshold.
      - name: cargo-deny
        run: |
          cargo install --locked cargo-deny
          cargo deny check

      # CycloneDX-format SBOM uploaded as a CI artifact and (on tag
      # pushes via release.yml) attached to the GitHub release.
      - name: cargo-sbom (CycloneDX)
        run: |
          cargo install --locked cargo-sbom
          cargo sbom --output-format=cyclone_dx_json_1_4 > sandkasten.cdx.json
          # Sanity-check the document structure.
          python3 -c 'import json,sys; d=json.load(open("sandkasten.cdx.json")); \
            assert d["bomFormat"]=="CycloneDX"; \
            print(f"SBOM OK: {len(d.get(\"components\",[]))} components")'
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sandkasten.cdx.json

  linux-smoke:
    name: Linux (end-to-end sandbox smoke)
    needs: linux
    # ubuntu-24.04's `unprivileged_userns` AppArmor profile blocks the
    # `/proc/self/setgroups` write that sandkasten needs after
    # CLONE_NEWUSER. ubuntu-22.04 doesn't ship that profile, so the
    # sandbox actually runs and the smoke test proves something. We
    # still keep `continue-on-error` because GitHub may start imposing
    # similar restrictions on older images at any time.
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure unprivileged user namespaces are enabled
        run: |
          sysctl kernel.unprivileged_userns_clone 2>/dev/null || true
          sudo sh -c 'echo 1 > /proc/sys/kernel/unprivileged_userns_clone' 2>/dev/null || true
          # Defensively disable the unprivileged-userns AppArmor profile
          # if the runner happens to be on an image that has it. Silent
          # no-op when the profile isn't present.
          sudo aa-teardown 2>/dev/null || true
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
      - run: cargo build --release
      - name: "`sandkasten run` end-to-end"
        run: |
          BIN="$(pwd)/target/release/sandkasten"
          "$BIN" render self
          echo 'hello sandkasten' > /tmp/sk-test.txt
          cd /tmp
          "$BIN" -v run self -- /bin/cat /tmp/sk-test.txt
      - name: Verify signing pipeline (no-sig case)
        run: |
          set +e
          "$(pwd)/target/release/sandkasten" verify /tmp/sk-test.txt
          rc=$?
          [ $rc -ne 0 ] || { echo "expected non-zero when unsigned"; exit 1; }
          echo "signing: correctly refused unsigned profile"
